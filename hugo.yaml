baseURL: "https://hrushi20.github.io/Blog/"
languageCode: "en-us"
title: "Premature Optimization"
theme: ["PaperMod"]
enableRobotsTXT: true
markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "Premature Optimization"
  description: "Systems engineering, performance tuning, memory optimization, and backend fundamentals by N. Hrushikesh Rao."
  keywords: ["systems engineering", "performance", "memory", "backend", "golang", "linux"]
  author: "N. Hrushikesh Rao"

  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  mainSections: ["blogs"]

  homeInfoParams:
    Title: "N. Hrushikesh Rao"
    Content: "Systems Engineer focused on performance, memory, and fundamentals."
    imageUrl: "/images/profile/profile-placeholder.svg"
    imageTitle: "Profile photo placeholder"
    imageWidth: 180
    imageHeight: 180

  socialIcons:
    - name: "x"
      url: "https://x.com/Hrushi2020"
    - name: "github"
      url: "https://github.com/hrushi20"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/hrushikesh-rao-7741311b0/"
    - name: "email"
      url: "mailto:hrushikesh20thegreat@gmail.com"
    - name: "link"
      url: "https://t.co/dKTRkVMuSX"

menu:
  main:
    - identifier: posts
      name: "Posts"
      url: "/blogs/"
      weight: 10
    - identifier: projects
      name: "Projects"
      url: "/project/"
      weight: 20
    - identifier: about
      name: "About"
      url: "/about/"
      weight: 30
    - identifier: resume
      name: "Resume"
      url: "/resume/"
      weight: 40
